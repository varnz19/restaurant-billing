<!DOCTYPE html>
<html>
<head>
    <title>Your Bill</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .bill-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px 40px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f7f7f7;
            font-weight: 600;
        }

        .total-row td {
            font-weight: 600;
            font-size: 18px;
        }

        .summary {
            margin-top: 20px;
            text-align: right;
            font-size: 16px;
        }

        .thank-you {
            text-align: center;
            margin-top: 30px;
            font-size: 18px;
            color: #555;
        }

        @media (max-width: 600px) {
            .bill-container {
                padding: 20px;
            }
            table th, table td {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="bill-container">
        <h1>Bill / Receipt</h1>

        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Price ($)</th>
                    <th>Subtotal ($)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Smash Burger</td>
                    <td>1</td>
                    <td>8.99</td>
                    <td>8.99</td>
                </tr>
                <tr>
                    <td>Peri Peri Fries</td>
                    <td>2</td>
                    <td>4.99</td>
                    <td>9.98</td>
                </tr>
                <tr>
                    <td>Chocolate Cake</td>
                    <td>1</td>
                    <td>6.99</td>
                    <td>6.99</td>
                </tr>
            </tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="3">Subtotal</td>
                    <td>25.96</td>
                </tr>
                <tr class="total-row">
                    <td colspan="3">Tax (5%)</td>
                    <td>1.30</td>
                </tr>
                <tr class="total-row">
                    <td colspan="3">Total</td>
                    <td>27.26</td>
                </tr>
            </tfoot>
        </table>

        <div class="thank-you">
            Thank you for visiting Street Cafe!
        </div>
    </div>

</body>
</html>
