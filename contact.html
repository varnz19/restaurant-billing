<!DOCTYPE html>
<html>
<head>
    <title>Contact | VARNZZ'S PLACE</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont,
                "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f6f3;
            color: #2c2c2c;
        }

        /* NAVBAR */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 80px;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: #000;
        }

        .cart {
            font-size: 14px;
            color: #555;
            text-decoration: none;
        }

        /* CONTACT SECTION */
        .contact-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }

        .contact-box {
            background: #ffffff;
            padding: 50px;
            width: 480px;
            border-radius: 6px;
            border: 1px solid #e5e5e5;
        }

        .contact-box h1 {
            font-size: 28px;
            margin-bottom: 35px;
            font-weight: 600;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #666;
            letter-spacing: 0.5px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
            font-size: 14px;
            background-color: #fafafa;
            box-sizing: border-box;
            transition: border 0.3s ease, background 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2c2c2c;
            background-color: #ffffff;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background-color: #2c2c2c;
            color: white;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        button:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

<nav class="nav">
    <div class="logo">VARNZZ'S PLACE</div>

    <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="newmenu.html">MENU</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <a href="yourcart.html" class="cart">
        Cart (<span id="cart-count">0</span>)
    </a>
</nav>

<div class="contact-wrapper">
    <div class="contact-box">
        <h1>Contact Us</h1>

        <form>
            <label>Name</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Concern</label>
            <select>
                <option>Suggestion</option>
                <option>Recommendation</option>
                <option>Just a message</option>
            </select>

            <label>Message</label>
            <textarea rows="5" required></textarea>

            <button type="submit">SEND MESSAGE</button>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    let countElement = document.getElementById("cart-count");
    if (countElement) {
        countElement.innerText = totalItems;
    }
});
</script>

</body>
</html>
