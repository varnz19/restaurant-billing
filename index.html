<!DOCTYPE html>
<html>
<head>
    <title>VARNZZ'S PLACE</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont,
                "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f6f3;
            color: #2c2c2c;
        }

        /* NAVBAR */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 80px;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #000;
        }

        .cart {
            font-size: 14px;
            color: #555;
            text-decoration: none;
        }

        /* HERO */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 18px;
            color: #777;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }

        .hero a {
            padding: 12px 32px;
            border: 1px solid #2c2c2c;
            text-decoration: none;
            color: #2c2c2c;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .hero a:hover {
            background-color: #2c2c2c;
            color: white;
        }
    </style>
</head>

<body>

<nav class="nav">
    <div class="logo">VARNZZ'S PLACE</div>

    <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="newmenu.html">MENU</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <a href="yourcart.html" class="cart">
        Cart (<span id="cart-count">0</span>)
    </a>
</nav>

<section class="hero">
    <h1>VARNZZ'S PLACE</h1>
    <p>
        A quiet corner for good food, warm drinks, and slow conversations.
    </p>
    <a href="newmenu.html">VIEW MENU</a>
</section>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    let countElement = document.getElementById("cart-count");
    if (countElement) {
        countElement.innerText = totalItems;
    }
});
</script>

</body>
</html>
