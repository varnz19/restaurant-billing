<!DOCTYPE html>
<html>
<head>
<title>Receipt | VARNZZ'S PLACE</title>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: #f7f6f3;
    font-family: "Courier New", monospace;
    color: #2c2c2c;
    display: flex;
    justify-content: center;
    padding: 80px 20px;
}

/* RECEIPT BOX */
.receipt {
    background: white;
    padding: 40px 50px;
    width: 400px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.receipt h1 {
    text-align: center;
    font-size: 20px;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

.line {
    border-top: 1px dashed #aaa;
    margin: 15px 0;
}

.item {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin: 6px 0;
}

.total {
    font-weight: bold;
    margin-top: 10px;
}

.footer-message {
    text-align: center;
    margin-top: 30px;
    font-size: 13px;
    color: #777;
    line-height: 1.6;
}

button {
    margin-top: 30px;
    width: 100%;
    padding: 10px;
    border: 1px solid #2c2c2c;
    background: transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
}

button:hover {
    background: #2c2c2c;
    color: white;
}
</style>
</head>

<body>

<div class="receipt">

<h1>VARNZZ'S PLACE</h1>
<div style="text-align:center;font-size:12px;">Late Night. Soft Lights. Good Food.</div>

<div class="line"></div>

<div id="receipt-items"></div>

<div class="line"></div>

<div id="receipt-totals"></div>

<div class="line"></div>

<div class="footer-message" id="cute-message"></div>

<button onclick="goHome()">Back to Home</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let itemsContainer = document.getElementById("receipt-items");
    let totalsContainer = document.getElementById("receipt-totals");

    if (cart.length === 0) {
        itemsContainer.innerHTML = `<div style="text-align:center;">No items purchased.</div>`;
        return;
    }

    let subtotal = 0;

    cart.forEach(item => {
        let itemTotal = item.price * item.quantity;
        subtotal += itemTotal;

        itemsContainer.innerHTML += `
            <div class="item">
                <span>${item.name} x${item.quantity}</span>
                <span>$${itemTotal.toFixed(2)}</span>
            </div>
        `;
    });

    let tax = subtotal * 0.05;
    let total = subtotal + tax;

    totalsContainer.innerHTML = `
        <div class="item total">
            <span>Subtotal</span>
            <span>$${subtotal.toFixed(2)}</span>
        </div>
        <div class="item">
            <span>Tax (5%)</span>
            <span>$${tax.toFixed(2)}</span>
        </div>
        <div class="item total">
            <span>TOTAL</span>
            <span>$${total.toFixed(2)}</span>
        </div>
    `;

    let messages = [
        "Stay soft. Eat carbs.",
        "Life happens. Dessert helps.",
        "Calories don't count at Varnzz's.",
        "Good food. Good mood.",
        "See you under the soft lights again."
    ];

    let randomMessage = messages[Math.floor(Math.random() * messages.length)];
    document.getElementById("cute-message").innerText = randomMessage;

    localStorage.removeItem("cart");
});

function goHome() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
