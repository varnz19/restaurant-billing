<!DOCTYPE html>
<html>
<head>
<title>Cart | VARNZZ'S PLACE</title>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: #f7f6f3;
    font-family: -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #2c2c2c;
}

/* NAVBAR */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 80px;
    background: white;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
}

.nav-links {
    display: flex;
    gap: 40px;
}

.nav-links a {
    text-decoration: none;
    color: #555;
    font-size: 14px;
    letter-spacing: 1px;
}

.nav-links a:hover {
    color: #000;
}

.cart-link {
    text-decoration: none;
    color: #555;
    font-size: 14px;
}

/* CART WRAPPER */
.cart-wrapper {
    max-width: 700px;
    margin: 100px auto;
    padding: 0 20px;
}

.cart-wrapper h1 {
    text-align: center;
    font-size: 36px;
    font-weight: 600;
    margin-bottom: 50px;
}

/* ITEM CARD STYLE */
.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px dashed #ddd;
}

.item-left {
    display: flex;
    flex-direction: column;
}

.item-name {
    font-size: 15px;
    font-weight: 500;
}

.item-price {
    font-size: 13px;
    color: #777;
    margin-top: 4px;
}

.item-controls {
    display: flex;
    align-items: center;
    gap: 10px;
}

.qty-btn {
    width: 26px;
    height: 26px;
    border: 1px solid #2c2c2c;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
}

.qty-btn:hover {
    background: #2c2c2c;
    color: white;
}

.qty-number {
    min-width: 20px;
    text-align: center;
    font-size: 14px;
}

.remove-btn {
    margin-left: 15px;
    background: none;
    border: none;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
}

.remove-btn:hover {
    color: #000;
}

/* TOTAL */
.cart-total {
    margin-top: 40px;
    text-align: right;
    font-size: 18px;
    font-weight: 600;
}

/* CHECKOUT BUTTON */
.checkout-btn {
    margin-top: 40px;
    width: 100%;
    padding: 14px;
    border: 1px solid #2c2c2c;
    background: transparent;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.checkout-btn:hover {
    background: #2c2c2c;
    color: white;
}

.empty {
    text-align: center;
    color: #777;
    padding: 40px 0;
}
</style>
</head>

<body>

<nav class="nav">
    <div class="logo">VARNZZ'S PLACE</div>

    <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="newmenu.html">MENU</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <a href="yourcart.html" class="cart-link">
        Cart (<span id="cart-count">0</span>)
    </a>
</nav>

<div class="cart-wrapper">

<h1>Your Cart</h1>

<div id="cart-items"></div>

<div class="cart-total" id="cart-total">
Total: $0.00
</div>

<button class="checkout-btn" onclick="goToPayment()">
Proceed to Payment
</button>

</div>

<script>
function goToPayment() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
    }
    window.location.href = "payment.html";
}
function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById("cart-count").innerText = totalItems;
}

function goToBill() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
    }
    window.location.href = "bill.html";
}

document.addEventListener("DOMContentLoaded", function() {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let container = document.getElementById("cart-items");

    function renderCart() {
        container.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = `<div class="empty">Your cart feels lonely.</div>`;
            document.getElementById("cart-total").innerText = "Total: $0.00";
            updateCartCount();
            return;
        }

        cart.forEach((item, index) => {
            let subtotal = item.price * item.quantity;
            total += subtotal;

            container.innerHTML += `
                <div class="cart-item">
                    <div class="item-left">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">$${item.price.toFixed(2)}</div>
                    </div>

                    <div class="item-controls">
                        <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                        <div class="qty-number">${item.quantity}</div>
                        <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                    </div>
                </div>
            `;
        });

        document.getElementById("cart-total").innerText =
            "Total: $" + total.toFixed(2);

        updateCartCount();
    }

    window.updateQuantity = function(index, change) {
        cart[index].quantity += change;

        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
    }

    window.removeItem = function(index) {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
    }

    renderCart();
});
</script>

</body>
</html>
