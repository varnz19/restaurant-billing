<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <meta charset="UTF-8">
    <style>
        /* Page Background */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* Cart Container */
        .cart-container {
            max-width: 700px;
            margin: 50px auto;
            padding: 30px 40px;
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        /* Page Title */
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            color: #333;
        }

        /* Cart Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f7f7f7;
            font-weight: 600;
        }

        /* Quantity Input */
        input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        /* Total Price */
        .total {
            text-align: right;
            font-size: 20px;
            font-weight: 600;
            margin-top: 20px;
        }

        /* Checkout Button */
        .checkout-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background-color: #ff7f50;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .checkout-btn:hover {
            background-color: #ff6333;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .cart-container {
                padding: 20px;
            }

            table th, table td {
                font-size: 14px;
            }

            .total {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="cart-container">
        <h1>Your Cart</h1>

        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price ($)</th>
                    <th>Subtotal ($)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Smash Burger</td>
                    <td><input type="number" value="1" min="1"></td>
                    <td>8.99</td>
                    <td>8.99</td>
                </tr>
                <tr>
                    <td>Peri Peri Fries</td>
                    <td><input type="number" value="2" min="1"></td>
                    <td>4.99</td>
                    <td>9.98</td>
                </tr>
                <tr>
                    <td>Chocolate Cake</td>
                    <td><input type="number" value="1" min="1"></td>
                    <td>6.99</td>
                    <td>6.99</td>
                </tr>
            </tbody>
        </table>

        <div class="total">
            Total: $25.96
        </div>

        <button class="checkout-btn">Checkout</button>
    </div>

</body>
</html>
